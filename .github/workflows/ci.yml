name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: nothing in this workflow writes to the repo.
permissions:
  contents: read

jobs:
  build-and-test:
    name: build, typecheck & test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      # The published server runs on Node 18+, so we build and type-check on 18.
      # The test runner (Vitest 4) requires Node 20+, so the suite runs on 20/22.
      - name: Test
        if: matrix.node != '18'
        run: npm test
