name: Publish to npm

on:
  release:
    types: [published]

# Least privilege: only the publish job escalates, and only to what it needs.
permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.prerelease }}
    permissions:
      contents: read
      id-token: write # required for npm provenance

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches the release tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "package.json version ($PKG_VERSION) does not match the release tag ($TAG_NAME)"
            exit 1
          fi

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
