name: PR title lint

# release-please classifies commits by Conventional Commits prefix (feat:,
# fix:, feat!:/BREAKING CHANGE:, etc.), and since this repo squash-merges,
# the commit it actually sees is the PR title. A PR that merges without a
# conventional prefix is invisible to release-please - no version bump, no
# changelog entry - so this checks the title at PR time, before merge, not
# after.
on:
  pull_request_target:
    types: [opened, edited, reopened]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
