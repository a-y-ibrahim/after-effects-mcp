version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Pinned: every release past ~1.9.0 we've tried (1.26.0, 1.29.0) makes
      # `tsc` OOM or exceed the CI timeout while type-checking this SDK's own
      # types (see SECURITY.md). This blocks minor/patch bumps too, not just
      # majors, because the break has shown up within the 1.x line itself.
      - dependency-name: "@modelcontextprotocol/sdk"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
